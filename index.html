<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corn Wallet Creator</title>
    <script src="https://cdn.jsdelivr.net/npm/xrpl@4.0.0/build/xrpl-latest-min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/argon2-browser@1.18.0/dist/argon2-bundled.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --corn-yellow: #facc15;
            --corn-blue: #2563eb;
        }
        body { background-color: #020617; color: #f8fafc; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; overflow-x: hidden; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.6; pointer-events: none; }
        .brand-text { color: var(--corn-yellow); text-shadow: 0 0 15px rgba(250, 204, 21, 0.6); }
        .glass { background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(250, 204, 21, 0.2); backdrop-filter: blur(20px); }
        .secret-blur { filter: blur(18px); transition: filter 0.3s ease; cursor: pointer; user-select: none; }
        .secret-visible { filter: none !important; user-select: text; }
        .input-dark { background: rgba(2, 6, 23, 0.9); border: 1px solid #1e293b; color: var(--corn-yellow); outline: none; }
        .btn-primary { background: var(--corn-yellow); color: #000; font-weight: 900; transition: all 0.2s; text-transform: uppercase; border: none; }
        .btn-primary:hover { background: #eab308; transform: scale(1.02); }
        .label-accent { color: var(--corn-blue); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 8px; display: block; }
        .section-card { border-left: 3px solid #1e293b; transition: border-color 0.4s; }
        .section-card:hover { border-left-color: var(--corn-yellow); }
        
        /* Flashing Footer Animation */
        @keyframes flash-yellow {
            0%, 100% { color: #facc15; opacity: 1; text-shadow: 0 0 10px #facc15; }
            50% { color: #854d0e; opacity: 0.5; text-shadow: none; }
        }
        .flash-footer { animation: flash-yellow 1.5s infinite ease-in-out; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--corn-yellow); }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen">
    <canvas id="bg-canvas"></canvas>

    <div class="max-w-4xl mx-auto space-y-10 pb-32 relative z-10">
        <header class="flex flex-col items-center border-b border-slate-800 pb-8 gap-4 text-center">
            <div class="flex items-center gap-4">
                <span class="text-4xl">🌽</span>
                <h1 class="text-3xl md:text-5xl font-black brand-text italic tracking-tighter uppercase">Corn Wallet Creator</h1>
                <span class="text-4xl">🌽</span>
            </div>
            <div class="flex gap-4">
                <button onclick="document.getElementById('vault-loader').click()" class="text-[10px] font-bold uppercase text-slate-400 hover:text-yellow-400 transition border border-slate-800 px-4 py-2 rounded-lg bg-slate-900/80">Load Grain</button>
                <input type="file" id="vault-loader" class="hidden" onchange="loadVault(this)">
            </div>
        </header>

        <div class="glass p-6 rounded-2xl sticky top-6 z-50 flex flex-col md:flex-row gap-4 shadow-2xl">
            <button onclick="generateEverything()" class="btn-primary flex-1 py-5 rounded-xl text-xs tracking-widest font-black">Harvest Keys</button>
            <button onclick="toggleVisibility()" id="vis-btn" class="bg-slate-950 border border-slate-800 px-8 py-5 rounded-xl text-[10px] font-bold uppercase hover:bg-slate-900 text-slate-400 hover:text-white transition-all">Reveal Grain</button>
        </div>

        <div id="output-area" class="hidden space-y-8">
            <section class="glass p-8 rounded-3xl section-card">
                <label class="label-accent">XRPL Account Address</label>
                <div id="addr" class="text-xl md:text-3xl font-black text-white break-all tracking-tighter"></div>
            </section>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="glass p-6 rounded-2xl section-card">
                    <label class="label-accent">12-Word</label>
                    <div id="m12" class="secret-blur text-xs text-slate-400 min-h-[50px]"></div>
                </div>
                <div class="glass p-6 rounded-2xl section-card">
                    <label class="label-accent">16-Word</label>
                    <div id="m16" class="secret-blur text-xs text-slate-400 min-h-[50px]"></div>
                </div>
                <div class="glass p-6 rounded-2xl section-card">
                    <label class="label-accent">24-Word</label>
                    <div id="m24" class="secret-blur text-xs text-slate-400 min-h-[50px]"></div>
                </div>
            </div>

            <section class="glass p-8 rounded-3xl section-card">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-sm font-black brand-text italic uppercase">Xaman Secret Numbers</h2>
                </div>
                <div id="xaman-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3 secret-blur"></div>
            </section>

            <section class="glass p-8 rounded-3xl section-card">
                <label class="label-accent">Family Seed (s...)</label>
                <div id="seed" class="secret-blur text-2xl md:text-3xl font-black text-white break-all tracking-tight"></div>
            </section>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="glass p-6 rounded-2xl section-card">
                    <label class="label-accent">Private Key (Hex)</label>
                    <div id="priv" class="secret-blur text-[10px] font-bold text-slate-500 break-all"></div>
                </div>
                <div class="glass p-6 rounded-2xl section-card">
                    <label class="label-accent">Public Key (Hex)</label>
                    <div id="pub" class="text-[10px] font-bold text-slate-500 break-all"></div>
                </div>
            </div>

            <div class="glass p-8 rounded-[2.5rem] border-t-2 border-yellow-400 space-y-8 bg-slate-900/80">
                <div class="flex flex-col md:flex-row justify-between gap-6">
                    <div>
                        <h3 class="text-lg font-black text-white italic uppercase">Vault Security</h3>
                        <p class="text-[8px] text-slate-500 font-bold tracking-widest uppercase">AES-256 Encrypted</p>
                    </div>
                    <div class="flex gap-2">
                        <input type="password" id="pass-1" placeholder="Pwd 1" class="input-dark p-3 rounded-lg text-[10px] w-full md:w-32">
                        <input type="password" id="pass-2" placeholder="Pwd 2" class="input-dark p-3 rounded-lg text-[10px] w-full md:w-32">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="exportEncrypted()" class="btn-primary py-4 rounded-xl text-[10px] font-black">Export .JBE</button>
                    <button onclick="exportPlaintext()" class="bg-slate-950 text-slate-500 border border-slate-800 py-4 rounded-xl text-[10px] font-black uppercase hover:text-yellow-400">Download JSON</button>
                </div>
            </div>
        </div>

        <footer class="text-center pt-16">
            <p class="text-[12px] font-black uppercase tracking-[0.5em] flash-footer">Powered by Corn</p>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const cornEmoji = "🌽";

        function initBg() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<85; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 30 + 10,
                    speedX: (Math.random() - 0.5) * 1,
                    speedY: Math.random() * 1.5 + 0.5,
                    opacity: Math.random() * 0.5 + 0.2,
                    rot: Math.random() * Math.PI * 2,
                    rotVel: (Math.random() - 0.5) * 0.05
                });
            }
        }

        function drawBg() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.globalAlpha = p.opacity;
                ctx.font = `${p.size}px Arial`;
                ctx.fillText(cornEmoji, -p.size/2, p.size/2);
                ctx.restore();
                
                p.x += p.speedX;
                p.y += p.speedY;
                p.rot += p.rotVel;
                
                if(p.y > canvas.height + 50) p.y = -50;
                if(p.x > canvas.width + 50) p.x = -50;
                if(p.x < -50) p.x = canvas.width + 50;
            });
            requestAnimationFrame(drawBg);
        }
        window.addEventListener('resize', initBg);
        initBg();
        drawBg();

        let currentSuite = null;
        let isVisible = false;

        async function generateEverything() {
            try {
                const entropy = crypto.getRandomValues(new Uint8Array(32));
                const mnemonic24 = ethers.utils.entropyToMnemonic(entropy);
                const wallet = xrpl.Wallet.fromMnemonic(mnemonic24, { algorithm: "ecdsa-secp256k1" });
                const entropy16 = entropy.slice(0, 16);
                const entropyHex = Array.from(entropy16).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
                const legacyWallet = xrpl.Wallet.fromEntropy(entropyHex);

                currentSuite = {
                    address: wallet.classicAddress,
                    m24: mnemonic24,
                    m12: ethers.utils.entropyToMnemonic(entropy.slice(0, 16)),
                    m16: derive16Word(entropy),
                    seed: legacyWallet.seed,
                    priv: wallet.privateKey,
                    pub: wallet.publicKey,
                    xaman: deriveXaman(entropy)
                };
                render();
                document.getElementById('output-area').classList.remove('hidden');
                isVisible = false; toggleVisibility();
            } catch (e) { alert("Harvest Error: " + e.message); }
        }

        function derive16Word(entropy) {
            const m18 = ethers.utils.entropyToMnemonic(entropy.slice(0, 24));
            return m18.split(' ').slice(0, 16).join(' ');
        }

        function deriveXaman(entropy) {
            const rows = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
            let res = {};
            const view = new DataView(entropy.buffer);
            for(let i=0; i<8; i++) {
                const val = view.getUint32(i * 4, false) % 1000000;
                res[rows[i]] = val.toString().padStart(6, '0');
            }
            return res;
        }

        function render() {
            document.getElementById('addr').innerText = currentSuite.address;
            document.getElementById('m12').innerText = currentSuite.m12;
            document.getElementById('m16').innerText = currentSuite.m16;
            document.getElementById('m24').innerText = currentSuite.m24;
            document.getElementById('seed').innerText = currentSuite.seed;
            document.getElementById('priv').innerText = currentSuite.priv;
            document.getElementById('pub').innerText = currentSuite.pub;

            const grid = document.getElementById('xaman-grid');
            grid.innerHTML = '';
            Object.entries(currentSuite.xaman).forEach(([row, val]) => {
                const div = document.createElement('div');
                div.className = "p-3 bg-slate-950/90 rounded-xl border border-slate-800 text-center";
                div.innerHTML = `<span class="block text-[8px] text-slate-600 font-bold mb-1">${row}</span><span class="text-white font-black text-sm">${val}</span>`;
                grid.appendChild(div);
            });
        }

        function toggleVisibility() {
            isVisible = !isVisible;
            const targets = document.querySelectorAll('.secret-blur, .secret-visible');
            targets.forEach(el => {
                if (isVisible) { el.classList.remove('secret-blur'); el.classList.add('secret-visible'); }
                else { el.classList.remove('secret-visible'); el.classList.add('secret-blur'); }
            });
            document.getElementById('vis-btn').innerText = isVisible ? "Hide Grain" : "Reveal Grain";
        }

        async function exportEncrypted() {
            const p1 = document.getElementById('pass-1').value;
            const p2 = document.getElementById('pass-2').value;
            if (!p1 || !p2) return alert("Two passwords required.");
            try {
                const salt = CryptoJS.lib.WordArray.random(16).toString();
                const keyHash = await argon2.hash({
                    pass: `${p1}:${p2}`, salt: salt, time: 3, mem: 65536, hashLen: 32, type: argon2.ArgonType.Argon2id
                });
                const ciphertext = CryptoJS.AES.encrypt(JSON.stringify(currentSuite), keyHash.hashHex).toString();
                const finalBlob = { version: "1.0", salt, data: ciphertext };
                download(JSON.stringify(finalBlob), `Corn_Vault_${currentSuite.address.slice(0,8)}.jbe`);
            } catch (e) { alert("Encryption Failed"); }
        }

        function exportPlaintext() {
            if (!currentSuite) return;
            download(JSON.stringify(currentSuite, null, 2), `Corn_Suite_${currentSuite.address.slice(0,8)}.json`);
        }

        function download(content, filename) {
            const blob = new Blob([content], { type: "application/json" });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
        }

        async function loadVault(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const raw = JSON.parse(e.target.result);
                    if (raw.address && raw.seed) { currentSuite = raw; } 
                    else if (raw.data && raw.salt) {
                        const p1 = prompt("Password 1:");
                        const p2 = prompt("Password 2:");
                        const keyHash = await argon2.hash({
                            pass: `${p1}:${p2}`, salt: raw.salt, time: 3, mem: 65536, hashLen: 32, type: argon2.ArgonType.Argon2id
                        });
                        const bytes = CryptoJS.AES.decrypt(raw.data, keyHash.hashHex);
                        currentSuite = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
                    }
                    render();
                    document.getElementById('output-area').classList.remove('hidden');
                    isVisible = true; toggleVisibility();
                } catch (err) { alert("Unlock failed."); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
