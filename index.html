<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORN SILO | Dual-Secure 24</title>
    <script src="https://cdn.jsdelivr.net/npm/xrpl@4.0.0/build/xrpl-latest-min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hash-wasm@4.11.0/dist/argon2.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --c-gold: #FFD700; --c-amber: #FFA500; --glow: 0 0 20px rgba(255, 215, 0, 0.4); }
        body { background-color: #000; color: #fff; font-family: 'Space Mono', monospace; overflow-x: hidden; margin: 0; }
        #fx-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.5; }
        
        .brand-font { font-family: 'Fredoka One', cursive; }
        .brand-text { color: var(--c-gold); text-shadow: 3px 3px 0px rgba(139, 69, 19, 0.6); }

        .glass { 
            background: rgba(10, 10, 5, 0.98); 
            border: 3px solid rgba(255, 215, 0, 0.25); 
            border-radius: 32px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
        }

        /* Glowing Effects */
        .btn-glow {
            background: linear-gradient(180deg, var(--c-gold) 0%, var(--c-amber) 100%);
            color: #4b2c00;
            font-family: 'Fredoka One', cursive;
            border-bottom: 5px solid #b8860b;
            border-radius: 20px;
            box-shadow: var(--glow);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-glow:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 215, 0, 0.7); filter: brightness(1.1); }
        .btn-glow:active { transform: translateY(4px); border-bottom-width: 1px; }

        .btn-outline-glow {
            border: 2px solid rgba(255, 215, 0, 0.3);
            color: var(--c-gold);
            font-family: 'Fredoka One', cursive;
            border-radius: 18px;
            transition: 0.3s;
            text-transform: uppercase;
            box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.1);
        }
        .btn-outline-glow:hover { border-color: var(--c-gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); background: rgba(255,215,0,0.05); }

        .label-accent { color: var(--c-gold); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .secret-blur { filter: blur(16px); transition: filter 0.4s ease; cursor: pointer; }
        .secret-visible { filter: none !important; }

        .input-dual {
            background: #000; border: 2px solid #222; border-radius: 18px;
            color: var(--c-gold); outline: none; padding: 16px;
            width: 100%; font-family: 'Space Mono', monospace;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .input-dual:focus { border-color: var(--c-gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.25); }

        .modal-overlay { background: rgba(0,0,0,0.94); backdrop-filter: blur(15px); display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen flex flex-col items-center">
    <canvas id="fx-canvas"></canvas>

    <div class="w-full max-w-4xl space-y-8 relative z-10">
        <header class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left">
                <h1 class="text-6xl md:text-7xl brand-font brand-text italic">CORN SILO</h1>
                <p class="text-[11px] font-black text-white/30 uppercase tracking-[0.5em] mt-2">The Dual-Password 24-Word Extraction Unit</p>
            </div>
            <nav class="flex glass p-2 rounded-full border-2 border-amber-500/20">
                <button onclick="switchTab('vault')" id="tab-vault" class="tab-btn brand-font px-6 py-2 text-amber-400">Vault</button>
                <button onclick="switchTab('vanity')" id="tab-vanity" class="tab-btn brand-font px-6 py-2 text-zinc-500">Engine</button>
            </nav>
        </header>

        <!-- TERMINAL -->
        <div id="view-vault" class="space-y-6">
            <div class="glass p-10 flex flex-col md:flex-row gap-8 items-center border-b-8 border-amber-500/10">
                <button onclick="generateNew()" class="btn-glow px-12 py-6 text-xl w-full md:w-auto">Harvest Suite</button>
                <div class="flex flex-wrap justify-center gap-6">
                    <label class="btn-outline-glow px-6 py-4 text-[10px] cursor-pointer flex items-center">
                        Open JSON <input type="file" id="import-file" class="hidden" accept=".json">
                    </label>
                    <button onclick="exportRaw()" class="text-[10px] font-black uppercase text-zinc-500 hover:text-white">Save Raw</button>
                    <button onclick="openModal('encrypt')" class="text-[10px] font-black uppercase text-amber-500 hover:brightness-125 font-bold">Save Secure</button>
                    <button onclick="toggleVisibility()" id="vis-btn" class="text-[10px] font-black uppercase text-zinc-500 hover:text-amber-400">Reveal</button>
                </div>
            </div>
            
            <div id="output-area" class="hidden space-y-4">
                <section class="glass p-8">
                    <label class="label-accent"><span>🌽</span> Address</label>
                    <div id="addr" class="text-2xl md:text-4xl font-bold text-white break-all tracking-tight"></div>
                </section>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <section class="glass p-8">
                        <label class="label-accent"><span>🔑</span> Family Seed</label>
                        <div id="seed" class="secret-blur text-xl font-bold text-amber-400 break-all"></div>
                    </section>
                    <section class="glass p-8 flex flex-col justify-center items-center text-center">
                        <div class="text-[10px] text-zinc-600 font-bold uppercase">Security Level</div>
                        <div class="text-[#FFD700] font-black text-2xl tracking-tighter">ARGON2 DUAL</div>
                    </section>
                </div>
                <section class="glass p-8">
                    <label class="label-accent"><span>📜</span> 24-Word Master Phrase</label>
                    <div class="bg-black/50 p-6 rounded-2xl border-2 border-dashed border-amber-500/20">
                        <div id="words" class="secret-blur text-sm md:text-base text-zinc-300 leading-relaxed text-center uppercase tracking-widest"></div>
                    </div>
                </section>
            </div>
        </div>

        <!-- TURBO ENGINE -->
        <div id="view-vanity" class="hidden space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="glass p-8 space-y-8 flex flex-col justify-center">
                    <div>
                        <label class="label-accent">Target r-Prefix</label>
                        <div class="flex bg-black rounded-2xl overflow-hidden border-2 border-zinc-800">
                            <span class="px-5 py-4 bg-zinc-900 text-zinc-500 font-bold">r</span>
                            <input type="text" id="vanity-prefix" placeholder="CORN" class="bg-transparent w-full px-2 py-4 outline-none text-amber-400 font-bold uppercase text-2xl" maxlength="6">
                        </div>
                    </div>
                    <button id="vanity-trigger" onclick="toggleVanity()" class="btn-glow py-6 text-xl">Engage Turbines</button>
                </div>
                <div class="lg:col-span-2 glass p-8">
                    <label class="label-accent">Mining Core Activity</label>
                    <div id="node-grid" class="flex flex-wrap gap-2 mb-8 justify-center"></div>
                    <div class="flex justify-between items-center border-t border-white/5 pt-6">
                        <div class="text-[11px] font-black text-zinc-500 uppercase">Matches: <span id="session-count" class="text-amber-400">0</span></div>
                        <div id="total-attempts" class="text-[11px] font-black text-zinc-500 uppercase">Total Attempts: 0</div>
                    </div>
                </div>
            </div>
            <div id="vanity-results" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <!-- SECURITY MODAL (ENCRYPT / DECRYPT) -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="glass p-10 max-w-lg w-full space-y-8 text-center border-4 border-amber-500/30">
            <h2 id="modal-title" class="brand-font text-4xl text-amber-400 italic">SECURE GATE</h2>
            <p id="modal-desc" class="text-[10px] text-zinc-500 uppercase font-black tracking-widest">Two-Pass Identity Verification</p>
            
            <div class="space-y-4">
                <input type="password" id="pass-1" placeholder="Passphrase One" class="input-dual">
                <input type="password" id="pass-2" placeholder="Passphrase Two" class="input-dual">
            </div>

            <div id="modal-status" class="text-[10px] font-bold text-amber-500 h-4"></div>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeModal()" class="btn-outline-glow py-5 text-xs">Cancel</button>
                <button id="modal-action-btn" class="btn-glow py-5 rounded-2xl text-xs">Execute</button>
            </div>
        </div>
    </div>

    <script>
        // --- VISUALS ---
        const canvas = document.getElementById('fx-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initBg() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = Array.from({length: 22}, () => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                size: Math.random()*15+15, vy: Math.random()*0.5+0.1, rot: Math.random()*6, rv: (Math.random()-0.5)*0.01
            }));
        }
        function drawBg() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => {
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
                ctx.globalAlpha = 0.2; ctx.font = p.size + "px serif"; ctx.fillText("🌽", 0, 0);
                ctx.restore();
                p.y += p.vy; p.rot += p.rv; if(p.y > canvas.height+30) p.y = -30;
            });
            requestAnimationFrame(drawBg);
        }
        window.addEventListener('resize', initBg); initBg(); drawBg();

        // --- STATE ---
        let currentWallet = null;
        let isVisible = false;
        let harvestBin = [];
        let pendingJsonData = null;

        // --- WALLET CORE ---
        async function generateNew() {
            const entropy = crypto.getRandomValues(new Uint8Array(32));
            const wallet = xrpl.Wallet.fromEntropy(entropy.slice(0, 16)); 
            displayWallet(wallet, entropy);
        }

        function displayWallet(wallet, entropy) {
            currentWallet = wallet;
            document.getElementById('addr').innerText = wallet.classicAddress;
            document.getElementById('seed').innerText = wallet.seed;
            document.getElementById('words').innerText = ethers.utils.entropyToMnemonic(entropy);
            document.getElementById('output-area').classList.remove('hidden');
            isVisible = false; applyVisibility();
        }

        function applyVisibility() {
            document.querySelectorAll('.secret-blur, .secret-visible').forEach(el => {
                el.className = isVisible ? 'secret-visible' : 'secret-blur';
                if(el.id === 'words') el.classList.add('text-sm', 'md:text-base', 'text-zinc-300', 'leading-relaxed', 'text-center', 'uppercase', 'tracking-widest');
                else el.classList.add('font-bold', 'text-amber-400', 'break-all');
            });
            document.getElementById('vis-btn').innerText = isVisible ? "Hide" : "Reveal";
        }

        function toggleVisibility() { isVisible = !isVisible; applyVisibility(); }
        function switchTab(t) {
            document.getElementById('view-vault').classList.toggle('hidden', t !== 'vault');
            document.getElementById('view-vanity').classList.toggle('hidden', t !== 'vanity');
            document.getElementById('tab-vault').className = t === 'vault' ? 'tab-btn brand-font px-6 py-2 text-amber-400' : 'tab-btn brand-font px-6 py-2 text-zinc-500';
            document.getElementById('tab-vanity').className = t === 'vanity' ? 'tab-btn brand-font px-6 py-2 text-amber-400' : 'tab-btn brand-font px-6 py-2 text-zinc-500';
        }

        // --- SECURITY LOGIC ---
        function openModal(mode) {
            const overlay = document.getElementById('modal-overlay');
            const title = document.getElementById('modal-title');
            const btn = document.getElementById('modal-action-btn');
            overlay.style.display = 'flex';
            document.getElementById('modal-status').innerText = "";
            document.getElementById('pass-1').value = "";
            document.getElementById('pass-2').value = "";

            if(mode === 'encrypt') {
                if(!currentWallet) {
                   overlay.style.display = 'none';
                   alert("Harvest a suite first!");
                   return;
                }
                title.innerText = "SEAL KERNEL";
                btn.innerText = "Encrypt & Save";
                btn.onclick = processEncrypt;
            } else {
                title.innerText = "OPEN KERNEL";
                btn.innerText = "Decrypt & Load";
                btn.onclick = processDecrypt;
            }
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        async function getArgonKey(p1, p2, salt) {
            return await hashwasm.argon2id({
                password: p1 + "::" + p2,
                salt: salt,
                parallelism: 1,
                iterations: 2,
                memorySize: 65536,
                hashLength: 32,
                outputType: 'binary'
            });
        }

        async function processEncrypt() {
            const p1 = document.getElementById('pass-1').value;
            const p2 = document.getElementById('pass-2').value;
            if(!p1 || !p2) return;
            if(!currentWallet) return;
            
            const status = document.getElementById('modal-status');
            status.innerText = "DERIVING DUAL KEY...";
            
            const salt = crypto.getRandomValues(new Uint8Array(16));
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const keyRaw = await getArgonKey(p1, p2, salt);
            const key = await crypto.subtle.importKey("raw", keyRaw, "AES-GCM", false, ["encrypt"]);
            
            const plaintext = JSON.stringify({
                a: currentWallet.classicAddress,
                s: currentWallet.seed,
                m: document.getElementById('words').innerText
            });

            const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, new TextEncoder().encode(plaintext));
            
            const exportObj = {
                type: "CORN_SILO_SECURE",
                mode: "DUAL_ARGON2",
                v: "2.0",
                salt: Array.from(salt),
                iv: Array.from(iv),
                data: btoa(String.fromCharCode(...new Uint8Array(ciphertext)))
            };

            download(JSON.stringify(exportObj, null, 2), `secure_${currentWallet.classicAddress.slice(0,6)}.json`);
            closeModal();
        }

        async function processDecrypt() {
            const p1 = document.getElementById('pass-1').value;
            const p2 = document.getElementById('pass-2').value;
            if(!p1 || !p2 || !pendingJsonData) return;

            const status = document.getElementById('modal-status');
            status.innerText = "RECONSTRUCTING KEY...";

            try {
                const keyRaw = await getArgonKey(p1, p2, new Uint8Array(pendingJsonData.salt));
                const key = await crypto.subtle.importKey("raw", keyRaw, "AES-GCM", false, ["decrypt"]);
                const ct = new Uint8Array(atob(pendingJsonData.data).split("").map(c => c.charCodeAt(0)));
                
                const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: new Uint8Array(pendingJsonData.iv) }, key, ct);
                const decrypted = JSON.parse(new TextDecoder().decode(pt));

                // Re-derive entropy from mnemonic to ensure UI remains consistent with generateNew
                const entropy = ethers.utils.mnemonicToEntropy(decrypted.m);
                const wallet = xrpl.Wallet.fromEntropy(new Uint8Array(entropy.match(/.{1,2}/g).map(byte => parseInt(byte, 16))).slice(0, 16));
                
                displayWallet(wallet, new Uint8Array(entropy.match(/.{1,2}/g).map(byte => parseInt(byte, 16))));
                closeModal();
            } catch(e) {
                status.innerText = "ACCESS DENIED: WRONG PASSWORDS";
            }
        }

        function exportRaw() {
            if(!currentWallet) return;
            const data = {
                address: currentWallet.classicAddress, seed: currentWallet.seed,
                mnemonic: document.getElementById('words').innerText
            };
            download(JSON.stringify(data, null, 2), `raw_${data.address.slice(0,6)}.json`);
        }

        document.getElementById('import-file').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = JSON.parse(event.target.result);
                if(data.type === "CORN_SILO_SECURE") {
                    pendingJsonData = data;
                    openModal('decrypt');
                } else {
                    const entropy = ethers.utils.mnemonicToEntropy(data.mnemonic);
                    const wallet = xrpl.Wallet.fromEntropy(new Uint8Array(entropy.match(/.{1,2}/g).map(byte => parseInt(byte, 16))).slice(0, 16));
                    displayWallet(wallet, new Uint8Array(entropy.match(/.{1,2}/g).map(byte => parseInt(byte, 16))));
                }
            };
            reader.readAsText(e.target.files[0]);
        };

        function download(c, n) {
            const blob = new Blob([c], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob); a.download = n; a.click();
        }

        // --- TURBO ENGINE ---
        let workers = [];
        let isSearching = false;
        let totalAttempts = 0;
        const WORKER_COUNT = Math.max(1, (navigator.hardwareConcurrency || 4) - 1);

        const workerBlob = new Blob([`
            importScripts('https://cdn.jsdelivr.net/npm/xrpl@4.0.0/build/xrpl-latest-min.js');
            self.onmessage = function(e) {
                const { prefix } = e.data;
                const fullPrefix = 'r' + prefix;
                while(true) {
                    const entropy = crypto.getRandomValues(new Uint8Array(32));
                    const wallet = xrpl.Wallet.fromEntropy(entropy.slice(0, 16));
                    if(wallet.classicAddress.startsWith(fullPrefix)) {
                        self.postMessage({ type: 'MATCH', entropy: Array.from(entropy), address: wallet.classicAddress });
                    }
                    self.postMessage({ type: 'STATS' });
                }
            }
        `], { type: 'application/javascript' });

        function toggleVanity() {
            const prefix = document.getElementById('vanity-prefix').value.toUpperCase();
            isSearching = !isSearching;
            const btn = document.getElementById('vanity-trigger');
            const grid = document.getElementById('node-grid');

            if(isSearching) {
                btn.innerText = "Kill Engine";
                btn.style.filter = "hue-rotate(280deg)";
                grid.innerHTML = '';
                for(let i=0; i<WORKER_COUNT; i++) {
                    const w = new Worker(URL.createObjectURL(workerBlob));
                    const pip = document.createElement('div');
                    pip.className = "w-3 h-5 bg-zinc-900 rounded-sm";
                    grid.appendChild(pip);

                    w.onmessage = (msg) => {
                        if(msg.data.type === 'STATS') {
                            totalAttempts++;
                            if(totalAttempts % 100 === 0) {
                                document.getElementById('total-attempts').innerText = "Attempts: " + totalAttempts.toLocaleString();
                                pip.style.background = "#FFD700";
                                pip.style.boxShadow = "0 0 10px #FFD700";
                                setTimeout(() => { pip.style.background = "#111"; pip.style.boxShadow = "none"; }, 50);
                            }
                        } else if(msg.data.type === 'MATCH') { processMatch(msg.data); }
                    };
                    w.postMessage({ prefix });
                    workers.push(w);
                }
            } else {
                btn.innerText = "Engage Turbines";
                btn.style.filter = "none";
                workers.forEach(w => w.terminate());
                workers = [];
            }
        }

        function processMatch(data) {
            harvestBin.push(data);
            document.getElementById('session-count').innerText = harvestBin.length;
            const res = document.getElementById('vanity-results');
            const div = document.createElement('div');
            div.className = "glass p-6 border-l-4 border-amber-400 flex justify-between items-center";
            div.innerHTML = `
                <div class="overflow-hidden">
                    <div class="text-[9px] text-amber-500 font-black uppercase">KERNEL FOUND</div>
                    <div class="text-xs font-bold text-white truncate w-40">${data.address}</div>
                </div>
                <button onclick="bank(${harvestBin.length - 1})" class="btn-glow px-4 py-2 rounded-xl text-[10px]">Bank</button>
            `;
            res.prepend(div);
        }

        function bank(idx) {
            const data = harvestBin[idx];
            const entropy = new Uint8Array(data.entropy);
            const wallet = xrpl.Wallet.fromEntropy(entropy.slice(0, 16));
            displayWallet(wallet, entropy);
            switchTab('vault');
        }
    </script>
</body>
</html>
