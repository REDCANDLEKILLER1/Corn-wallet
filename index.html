<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corn Wallet Creator</title>
    <script src="https://cdn.jsdelivr.net/npm/xrpl@4.0.0/build/xrpl-latest-min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/argon2-browser@1.18.0/dist/argon2-bundled.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --corn-yellow: #facc15; /* Tailwind yellow-400 */
            --corn-blue: #2563eb;   /* Tailwind blue-600 */
        }
        body { background-color: #020617; color: #f8fafc; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; overflow-x: hidden; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; pointer-events: none; }
        .brand-text { color: var(--corn-yellow); text-shadow: 0 0 15px rgba(250, 204, 21, 0.4); }
        .glass { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(250, 204, 21, 0.1); backdrop-filter: blur(16px); }
        .secret-blur { filter: blur(16px); transition: filter 0.3s ease; cursor: pointer; user-select: none; }
        .secret-visible { filter: none !important; user-select: text; }
        .input-dark { background: rgba(2, 6, 23, 0.8); border: 1px solid #1e293b; color: var(--corn-yellow); outline: none; transition: all 0.2s; }
        .input-dark:focus { border-color: var(--corn-blue); box-shadow: 0 0 10px rgba(37, 99, 235, 0.3); }
        .btn-primary { background: var(--corn-yellow); color: #000; font-weight: 900; transition: all 0.2s; text-transform: uppercase; border: none; }
        .btn-primary:hover { background: #eab308; box-shadow: 0 0 25px rgba(250, 204, 21, 0.4); transform: translateY(-1px); }
        .label-accent { color: var(--corn-blue); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 8px; display: block; }
        .section-card { border-left: 2px solid #1e293b; transition: border-color 0.4s; }
        .section-card:hover { border-left-color: var(--corn-yellow); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--corn-yellow); }
        .pro-title { font-size: 2.5rem; line-height: 1; letter-spacing: -0.05em; font-weight: 900; }
        @media (max-width: 768px) { .pro-title { font-size: 1.75rem; } }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen">
    <canvas id="bg-canvas"></canvas>

    <div class="max-w-4xl mx-auto space-y-10 pb-32 relative z-10">
        <header class="flex flex-col items-center border-b border-slate-800 pb-8 gap-4 text-center">
            <div class="flex items-center gap-4">
                <span class="text-4xl">🌽</span>
                <h1 class="pro-title brand-text italic tracking-tighter uppercase">Corn Wallet Creator</h1>
                <span class="text-4xl">🌽</span>
            </div>
            <div class="flex gap-4 mt-2">
                <button onclick="document.getElementById('vault-loader').click()" class="text-[10px] font-bold uppercase text-slate-400 hover:text-yellow-400 transition border border-slate-800 px-4 py-2 rounded-lg bg-slate-900/50">Load Vault</button>
                <input type="file" id="vault-loader" class="hidden" onchange="loadVault(this)">
            </div>
        </header>

        <!-- MASTER CONTROL -->
        <div class="glass p-6 rounded-2xl sticky top-6 z-50 flex flex-col md:flex-row gap-4 shadow-2xl">
            <button onclick="generateEverything()" class="btn-primary flex-1 py-5 rounded-xl text-xs tracking-widest font-black">Harvest New Keys</button>
            <button onclick="toggleVisibility()" id="vis-btn" class="bg-slate-950 border border-slate-800 px-8 py-5 rounded-xl text-[10px] font-bold uppercase hover:bg-slate-900 text-slate-400 hover:text-white transition-all">Show Secrets</button>
        </div>

        <div id="output-area" class="hidden space-y-8 animate-in fade-in duration-500">
            
            <!-- IDENTITY -->
            <section class="glass p-8 md:p-10 rounded-3xl section-card border-l-corn-blue">
                <label class="label-accent">XRPL Account Address</label>
                <div id="addr" class="text-xl md:text-3xl font-black text-white break-all select-all tracking-tighter"></div>
            </section>

            <!-- MNEMONICS -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="glass p-6 rounded-2xl section-card">
                    <label class="label-accent">12-Word Mnemonic</label>
                    <div id="m12" class="secret-blur text-xs text-slate-400 leading-relaxed min-h-[50px]"></div>
                </div>
                <div class="glass p-6 rounded-2xl section-card">
                    <label class="label-accent">16-Word Ref</label>
                    <div id="m16" class="secret-blur text-xs text-slate-400 leading-relaxed min-h-[50px]"></div>
                </div>
                <div class="glass p-6 rounded-2xl section-card">
                    <label class="label-accent">24-Word Mnemonic</label>
                    <div id="m24" class="secret-blur text-xs text-slate-400 leading-relaxed min-h-[50px]"></div>
                </div>
            </div>

            <!-- XAMAN NUMBERS -->
            <section class="glass p-8 md:p-10 rounded-3xl section-card">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-sm font-black brand-text italic uppercase tracking-widest">Xaman Secret Numbers</h2>
                    <span class="text-[8px] text-slate-500 font-bold uppercase tracking-[0.2em]">Standard A-H</span>
                </div>
                <div id="xaman-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3 secret-blur"></div>
            </section>

            <!-- FAMILY SEED -->
            <section class="glass p-8 md:p-10 rounded-3xl section-card">
                <label class="label-accent">Family Seed (s...)</label>
                <div id="seed" class="secret-blur text-2xl md:text-3xl font-black text-white break-all tracking-tight"></div>
            </section>

            <!-- HEX KEYS -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="glass p-6 rounded-2xl section-card">
                    <label class="label-accent">Private Key (Hex)</label>
                    <div id="priv" class="secret-blur text-[10px] font-bold text-slate-500 break-all"></div>
                </div>
                <div class="glass p-6 rounded-2xl section-card">
                    <label class="label-accent">Public Key (Hex)</label>
                    <div id="pub" class="text-[10px] font-bold text-slate-500 break-all"></div>
                </div>
            </div>

            <!-- EXPORT ENGINE -->
            <div class="glass p-8 md:p-10 rounded-[2.5rem] border-t-2 border-yellow-400 space-y-8 bg-slate-900/60">
                <div class="flex flex-col md:flex-row justify-between gap-6">
                    <div class="space-y-1">
                        <h3 class="text-lg font-black text-white italic uppercase tracking-tighter">Grain Storage (Export)</h3>
                        <p class="text-[8px] text-slate-500 uppercase font-bold tracking-[0.3em]">AES-256 + Argon2id Hybrid Encryption</p>
                    </div>
                    <div class="flex gap-2">
                        <input type="password" id="pass-1" placeholder="Primary Pwd" class="input-dark p-3 rounded-lg text-[10px] w-full md:w-32">
                        <input type="password" id="pass-2" placeholder="Secondary Pwd" class="input-dark p-3 rounded-lg text-[10px] w-full md:w-32">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="exportEncrypted()" class="btn-primary py-4 rounded-xl text-[10px] tracking-widest font-black">Export Secure .JBE</button>
                    <button onclick="exportPlaintext()" class="bg-slate-950 text-slate-500 border border-slate-800 py-4 rounded-xl text-[10px] tracking-widest font-black uppercase hover:text-yellow-400 transition">Download Standard JSON</button>
                </div>
            </div>
        </div>

        <footer class="text-center pt-10 opacity-40">
            <p class="text-[10px] font-black uppercase tracking-[0.8em] text-white">Powered by Corn</p>
        </footer>
    </div>

    <script>
        // --- BACKGROUND ANIMATION ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const cornEmoji = "🌽";

        function initBg() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<40; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 25 + 10,
                    speed: Math.random() * 0.8 + 0.2,
                    opacity: Math.random() * 0.4 + 0.1,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.02
                });
            }
        }

        function drawBg() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                ctx.globalAlpha = p.opacity;
                ctx.font = `${p.size}px Arial`;
                ctx.fillText(cornEmoji, -p.size/2, p.size/2);
                ctx.restore();
                
                p.y += p.speed;
                p.rotation += p.rotSpeed;
                if(p.y > canvas.height + 50) p.y = -50;
            });
            requestAnimationFrame(drawBg);
        }
        window.addEventListener('resize', initBg);
        initBg();
        drawBg();

        // --- WALLET LOGIC ---
        let currentSuite = null;
        let isVisible = false;

        async function generateEverything() {
            try {
                const entropy = crypto.getRandomValues(new Uint8Array(32));
                const mnemonic24 = ethers.utils.entropyToMnemonic(entropy);
                const wallet = xrpl.Wallet.fromMnemonic(mnemonic24, { algorithm: "ecdsa-secp256k1" });
                
                const entropy16 = entropy.slice(0, 16);
                const entropyHex = Array.from(entropy16).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
                const legacyWallet = xrpl.Wallet.fromEntropy(entropyHex);

                currentSuite = {
                    address: wallet.classicAddress,
                    m24: mnemonic24,
                    m12: ethers.utils.entropyToMnemonic(entropy.slice(0, 16)),
                    m16: derive16Word(entropy),
                    seed: legacyWallet.seed,
                    priv: wallet.privateKey,
                    pub: wallet.publicKey,
                    xaman: deriveXaman(entropy)
                };

                render();
                document.getElementById('output-area').classList.remove('hidden');
                isVisible = false;
                toggleVisibility(); 
            } catch (e) {
                console.error(e);
                alert("Harvest Failed: " + e.message);
            }
        }

        function derive16Word(entropy) {
            const m18 = ethers.utils.entropyToMnemonic(entropy.slice(0, 24));
            return m18.split(' ').slice(0, 16).join(' ');
        }

        function deriveXaman(entropy) {
            const rows = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
            let res = {};
            const view = new DataView(entropy.buffer);
            for(let i=0; i<8; i++) {
                const val = view.getUint32(i * 4, false) % 1000000;
                res[rows[i]] = val.toString().padStart(6, '0');
            }
            return res;
        }

        function render() {
            document.getElementById('addr').innerText = currentSuite.address;
            document.getElementById('m12').innerText = currentSuite.m12;
            document.getElementById('m16').innerText = currentSuite.m16;
            document.getElementById('m24').innerText = currentSuite.m24;
            document.getElementById('seed').innerText = currentSuite.seed;
            document.getElementById('priv').innerText = currentSuite.priv;
            document.getElementById('pub').innerText = currentSuite.pub;

            const grid = document.getElementById('xaman-grid');
            grid.innerHTML = '';
            Object.entries(currentSuite.xaman).forEach(([row, val]) => {
                const div = document.createElement('div');
                div.className = "p-3 bg-slate-950/80 rounded-xl border border-slate-800 text-center";
                div.innerHTML = `<span class="block text-[8px] text-slate-600 font-bold mb-1">${row}</span><span class="text-white font-black tracking-widest text-sm">${val}</span>`;
                grid.appendChild(div);
            });
        }

        function toggleVisibility() {
            isVisible = !isVisible;
            const targets = document.querySelectorAll('.secret-blur, .secret-visible');
            targets.forEach(el => {
                if (isVisible) {
                    el.classList.remove('secret-blur');
                    el.classList.add('secret-visible');
                } else {
                    el.classList.remove('secret-visible');
                    el.classList.add('secret-blur');
                }
            });
            document.getElementById('vis-btn').innerText = isVisible ? "Hide Grain" : "Reveal Grain";
        }

        async function exportEncrypted() {
            const p1 = document.getElementById('pass-1').value;
            const p2 = document.getElementById('pass-2').value;
            if (!p1 || !p2) return alert("Double passwords required.");
            
            try {
                const salt = CryptoJS.lib.WordArray.random(16).toString();
                const keyHash = await argon2.hash({
                    pass: `${p1}:${p2}`,
                    salt: salt,
                    time: 3, mem: 65536, hashLen: 32, type: argon2.ArgonType.Argon2id
                });

                const ciphertext = CryptoJS.AES.encrypt(JSON.stringify(currentSuite), keyHash.hashHex).toString();
                const finalBlob = { version: "1.0", salt, data: ciphertext };
                
                download(JSON.stringify(finalBlob), `Corn_Vault_${currentSuite.address.slice(0,8)}.jbe`);
            } catch (e) {
                alert("Encryption Failed");
            }
        }

        function exportPlaintext() {
            if (!currentSuite) return;
            download(JSON.stringify(currentSuite, null, 2), `Corn_Plaintext_${currentSuite.address.slice(0,8)}.json`);
        }

        function download(content, filename) {
            const blob = new Blob([content], { type: "application/json" });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
        }

        async function loadVault(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const raw = JSON.parse(e.target.result);
                    if (raw.address && raw.seed) {
                        currentSuite = raw;
                    } else if (raw.data && raw.salt) {
                        const p1 = prompt("Primary Password:");
                        const p2 = prompt("Secondary Password:");
                        const keyHash = await argon2.hash({
                            pass: `${p1}:${p2}`,
                            salt: raw.salt,
                            time: 3, mem: 65536, hashLen: 32, type: argon2.ArgonType.Argon2id
                        });
                        const bytes = CryptoJS.AES.decrypt(raw.data, keyHash.hashHex);
                        currentSuite = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
                    }
                    render();
                    document.getElementById('output-area').classList.remove('hidden');
                    isVisible = true; toggleVisibility();
                } catch (err) {
                    alert("Authentication failure: Incorrect passwords or corrupt grain.");
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
