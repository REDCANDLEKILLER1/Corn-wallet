<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORN SILO | Dual-Secure 24</title>
    <script src="https://cdn.jsdelivr.net/npm/xrpl@4.0.0/build/xrpl-latest-min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hash-wasm@4.11.0/dist/argon2.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --c-gold: #FFD700; --c-amber: #FFA500; --glow-soft: 0 0 15px rgba(255, 215, 0, 0.3); --glow-hard: 0 0 25px rgba(255, 215, 0, 0.6); }
        body { background-color: #000; color: #fff; font-family: 'Space Mono', monospace; overflow-x: hidden; margin: 0; }
        #fx-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.5; }
        
        .brand-font { font-family: 'Fredoka One', cursive; }
        .brand-text { color: var(--c-gold); text-shadow: 3px 3px 0px rgba(139, 69, 19, 0.5); }

        /* Deluxe Containers */
        .glass { 
            background: rgba(12, 12, 8, 0.96); 
            border: 3px solid rgba(255, 215, 0, 0.2); 
            border-radius: 28px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.9);
            transition: border-color 0.3s;
        }
        .glass:hover { border-color: rgba(255, 215, 0, 0.4); }

        /* Glowing Interactive Elements */
        .btn-glow {
            background: linear-gradient(180deg, var(--c-gold) 0%, var(--c-amber) 100%);
            color: #4b2c00;
            font-family: 'Fredoka One', cursive;
            border-bottom: 4px solid #b8860b;
            border-radius: 20px;
            box-shadow: var(--glow-soft);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-glow:hover { transform: scale(1.03); box-shadow: var(--glow-hard); filter: brightness(1.1); }
        .btn-glow:active { transform: translateY(3px); border-bottom-width: 1px; }

        .btn-outline-glow {
            border: 2px solid rgba(255, 215, 0, 0.3);
            color: var(--c-gold);
            font-family: 'Fredoka One', cursive;
            border-radius: 18px;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .btn-outline-glow:hover { 
            background: rgba(255, 215, 0, 0.1); 
            border-color: var(--c-gold);
            box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .label-accent { color: var(--c-gold); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .secret-blur { filter: blur(15px); transition: filter 0.4s ease; cursor: pointer; }
        .secret-visible { filter: none !important; }

        /* Form Elements */
        .input-dual {
            background: #000;
            border: 2px solid #222;
            border-radius: 16px;
            color: var(--c-gold);
            outline: none;
            padding: 14px;
            width: 100%;
            font-family: 'Space Mono', monospace;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .input-dual:focus { border-color: var(--c-gold); box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }

        /* Animation */
        @keyframes pulse-gold { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        .active-pip { background: var(--c-gold); box-shadow: 0 0 12px var(--c-gold); animation: pulse-gold 0.5s infinite; }

        #modal-overlay { background: rgba(0,0,0,0.92); backdrop-filter: blur(12px); display: none; }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen flex flex-col items-center">
    <canvas id="fx-canvas"></canvas>

    <div class="w-full max-w-4xl space-y-8 relative z-10">
        <header class="flex flex-col md:flex-row justify-between items-end gap-6 border-b border-white/10 pb-6">
            <div class="text-center md:text-left">
                <h1 class="text-5xl md:text-7xl brand-font brand-text italic leading-tight">CORN SILO</h1>
                <p class="text-[11px] font-black text-white/30 uppercase tracking-[0.6em]">Two-Password Secure Terminal</p>
            </div>
            <nav class="flex glass p-2 rounded-full px-4 border-2">
                <button onclick="switchTab('vault')" id="tab-vault" class="tab-btn brand-font px-6 py-2 text-zinc-500 active">Terminal</button>
                <button onclick="switchTab('vanity')" id="tab-vanity" class="tab-btn brand-font px-6 py-2 text-zinc-500">Engine</button>
            </nav>
        </header>

        <!-- TERMINAL -->
        <div id="view-vault" class="space-y-6">
            <div class="glass p-10 flex flex-col md:flex-row gap-8 items-center border-b-8 border-amber-500/20">
                <button onclick="generateNew()" class="btn-glow px-12 py-6 text-xl w-full md:w-auto">Harvest New Seed</button>
                <div class="flex flex-wrap justify-center gap-6">
                    <button onclick="toggleVisibility()" id="vis-btn" class="text-[10px] font-black uppercase text-zinc-500 hover:text-amber-400">View Secret</button>
                    <button onclick="exportRaw()" class="text-[10px] font-black uppercase text-zinc-500 hover:text-white">Export Raw</button>
                    <button onclick="openSecureModal()" class="text-[10px] font-black uppercase text-amber-500 hover:text-amber-300 font-bold">Secure Export</button>
                </div>
            </div>
            
            <div id="output-area" class="hidden space-y-4 animate-in fade-in duration-500">
                <section class="glass p-8">
                    <label class="label-accent"><span>🌽</span> Terminal Address</label>
                    <div id="addr" class="text-2xl md:text-4xl font-bold text-white break-all tracking-tighter"></div>
                </section>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <section class="glass p-8">
                        <label class="label-accent"><span>🔑</span> Family Seed</label>
                        <div id="seed" class="secret-blur text-xl font-bold text-amber-400 break-all"></div>
                    </section>
                    <section class="glass p-8 flex flex-col justify-center items-center text-center bg-amber-500/5">
                        <div class="text-[10px] text-zinc-600 font-black uppercase mb-1">Mnemonic Standard</div>
                        <div class="text-white font-black text-2xl tracking-widest">24 WORDS</div>
                    </section>
                </div>
                <section class="glass p-8">
                    <label class="label-accent"><span>📜</span> Master Mnemonic Phrase</label>
                    <div class="bg-black/40 p-6 rounded-2xl border-2 border-dashed border-amber-500/20">
                        <div id="words" class="secret-blur text-sm md:text-base text-zinc-300 leading-loose tracking-widest text-center uppercase"></div>
                    </div>
                </section>
            </div>
        </div>

        <!-- ENGINE -->
        <div id="view-vanity" class="hidden space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="glass p-8 space-y-8 flex flex-col justify-center border-l-8 border-amber-500">
                    <div>
                        <label class="label-accent">Search Prefix</label>
                        <div class="flex bg-black rounded-2xl overflow-hidden border-2 border-zinc-800 focus-within:border-amber-500 transition-colors">
                            <span class="px-5 py-4 bg-zinc-900 text-zinc-500 font-bold text-xl">r</span>
                            <input type="text" id="vanity-prefix" placeholder="CORN" class="bg-transparent w-full px-2 py-4 outline-none text-amber-400 font-bold uppercase text-2xl" maxlength="6">
                        </div>
                    </div>
                    <button id="vanity-trigger" onclick="toggleVanity()" class="btn-glow py-6 text-xl rounded-2xl">Engage Turbines</button>
                </div>
                <div class="lg:col-span-2 glass p-8">
                    <label class="label-accent">Processor Array</label>
                    <div id="node-grid" class="flex flex-wrap gap-3 mb-8 justify-center"></div>
                    <div class="flex justify-between items-center border-t border-white/5 pt-6">
                        <div class="text-[11px] font-black text-zinc-500 uppercase">Found: <span id="session-count" class="text-amber-400">0</span></div>
                        <div id="total-attempts" class="text-[11px] font-black text-zinc-500 uppercase tracking-widest">Cycles: 0</div>
                    </div>
                </div>
            </div>
            <div id="vanity-results" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <!-- SECURITY MODAL: DUAL PASSPHRASE -->
    <div id="modal-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="glass p-10 max-w-lg w-full space-y-8 text-center border-4 border-amber-500/40">
            <h2 class="brand-font text-4xl text-amber-400 tracking-tight">TWO-PASS VAULT</h2>
            <p class="text-[10px] text-zinc-500 uppercase font-black tracking-[0.3em]">Dual Argon2id + AES-256-GCM</p>
            
            <div class="space-y-4">
                <input type="password" id="pass-1" placeholder="Primary Passphrase" class="input-dual">
                <input type="password" id="pass-2" placeholder="Secondary Passphrase" class="input-dual">
            </div>

            <div id="secure-status" class="text-[10px] font-black uppercase text-amber-500/60 h-4">Standing by...</div>
            
            <div class="grid grid-cols-2 gap-4 pt-4">
                <button onclick="closeSecureModal()" class="btn-outline-glow py-5 text-xs">Abandom</button>
                <button id="confirm-encrypt" onclick="processSecureExport()" class="btn-glow py-5 rounded-2xl text-xs">Seal & Save</button>
            </div>
        </div>
    </div>

    <script>
        // --- VISUAL ENGINE ---
        const canvas = document.getElementById('fx-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initBg() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = Array.from({length: 25}, () => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                size: Math.random()*15+15, vy: Math.random()*0.4+0.1, rot: Math.random()*6, rv: (Math.random()-0.5)*0.01
            }));
        }
        function drawBg() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => {
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
                ctx.globalAlpha = 0.25; ctx.font = p.size + "px serif"; ctx.fillText("🌽", 0, 0);
                ctx.restore();
                p.y += p.vy; p.rot += p.rv; if(p.y > canvas.height+30) p.y = -30;
            });
            requestAnimationFrame(drawBg);
        }
        window.addEventListener('resize', initBg); initBg(); drawBg();

        // --- CORE LOGIC ---
        let currentWallet = null;
        let isVisible = false;
        let harvestBin = [];

        async function generateNew() {
            const entropy = crypto.getRandomValues(new Uint8Array(32));
            const wallet = xrpl.Wallet.fromEntropy(entropy.slice(0, 16)); 
            displayWallet(wallet, entropy);
        }

        function displayWallet(wallet, entropy) {
            currentWallet = wallet;
            document.getElementById('addr').innerText = wallet.classicAddress;
            document.getElementById('seed').innerText = wallet.seed;
            document.getElementById('words').innerText = ethers.utils.entropyToMnemonic(entropy);
            document.getElementById('output-area').classList.remove('hidden');
            isVisible = false; applyVisibility();
        }

        function applyVisibility() {
            document.querySelectorAll('.secret-blur, .secret-visible').forEach(el => {
                el.className = isVisible ? 'secret-visible' : 'secret-blur';
                if(el.id === 'words') el.classList.add('text-sm', 'md:text-base', 'text-zinc-300', 'leading-loose', 'tracking-widest', 'text-center', 'uppercase');
                else el.classList.add('font-bold', 'text-amber-400', 'break-all');
            });
            document.getElementById('vis-btn').innerText = isVisible ? "Hide Secret" : "View Secret";
        }

        function toggleVisibility() { isVisible = !isVisible; applyVisibility(); }
        
        function switchTab(t) {
            document.getElementById('view-vault').classList.toggle('hidden', t !== 'vault');
            document.getElementById('view-vanity').classList.toggle('hidden', t !== 'vanity');
            document.querySelectorAll('.tab-btn').forEach(b => {
                const active = b.id === 'tab-' + t;
                b.classList.toggle('text-zinc-500', !active);
                b.classList.toggle('text-amber-400', active);
            });
        }

        // --- EXPORT & DUAL ARGON2 ---
        function exportRaw() {
            if(!currentWallet) return;
            const data = {
                address: currentWallet.classicAddress, seed: currentWallet.seed,
                mnemonic: document.getElementById('words').innerText,
                type: "CORN_SILO_RAW", ts: new Date().toISOString()
            };
            download(JSON.stringify(data, null, 2), `raw_${data.address.slice(0,6)}.json`);
        }

        function openSecureModal() { if(currentWallet) document.getElementById('modal-overlay').style.display = 'flex'; }
        function closeSecureModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        async function processSecureExport() {
            const p1 = document.getElementById('pass-1').value;
            const p2 = document.getElementById('pass-2').value;
            const status = document.getElementById('secure-status');
            
            if(!p1 || !p2) { status.innerText = "BOTH PASSWORDS REQUIRED"; return; }
            
            status.innerText = "MIXING DUAL KERNELS...";
            const combinedPass = p1 + "::" + p2;
            const salt = crypto.getRandomValues(new Uint8Array(16));
            
            try {
                // High-Security Argon2id
                const hash = await hashwasm.argon2id({
                    password: combinedPass, salt: salt,
                    parallelism: 1, iterations: 3,
                    memorySize: 65536, hashLength: 32, outputType: 'binary'
                });

                status.innerText = "SEALING VAULT...";
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const key = await crypto.subtle.importKey("raw", hash, "AES-GCM", false, ["encrypt"]);
                
                const plaintext = JSON.stringify({
                    a: currentWallet.classicAddress,
                    s: currentWallet.seed,
                    m: document.getElementById('words').innerText
                });

                const encrypted = await crypto.subtle.encrypt(
                    { name: "AES-GCM", iv: iv }, key, new TextEncoder().encode(plaintext)
                );

                const exportObj = {
                    v: "2.0", mode: "DUAL_ARGON2",
                    address: currentWallet.classicAddress,
                    salt: Array.from(salt), iv: Array.from(iv),
                    data: btoa(String.fromCharCode(...new Uint8Array(encrypted)))
                };

                download(JSON.stringify(exportObj, null, 2), `secure_${exportObj.address.slice(0,6)}.json`);
                status.innerText = "SUCCESSFUL HARVEST";
                setTimeout(closeSecureModal, 1000);
            } catch(e) { status.innerText = "ERR: " + e.message; }
        }

        function download(content, name) {
            const blob = new Blob([content], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = name;
            a.click();
        }

        // --- TURBO ENGINE ---
        let workers = [];
        let isSearching = false;
        let totalAttempts = 0;
        const WORKER_COUNT = Math.max(1, (navigator.hardwareConcurrency || 4) - 1);

        const workerBlob = new Blob([`
            importScripts('https://cdn.jsdelivr.net/npm/xrpl@4.0.0/build/xrpl-latest-min.js');
            self.onmessage = function(e) {
                const { prefix } = e.data;
                const fullPrefix = 'r' + prefix;
                while(true) {
                    const entropy = crypto.getRandomValues(new Uint8Array(32));
                    const wallet = xrpl.Wallet.fromEntropy(entropy.slice(0, 16));
                    if(wallet.classicAddress.startsWith(fullPrefix)) {
                        self.postMessage({ type: 'MATCH', entropy: Array.from(entropy), address: wallet.classicAddress });
                    }
                    self.postMessage({ type: 'STATS' });
                }
            }
        `], { type: 'application/javascript' });

        function toggleVanity() {
            const prefix = document.getElementById('vanity-prefix').value.toUpperCase();
            isSearching = !isSearching;
            const btn = document.getElementById('vanity-trigger');
            const grid = document.getElementById('node-grid');

            if(isSearching) {
                btn.innerText = "Halt Turbines";
                btn.style.filter = "hue-rotate(280deg)";
                grid.innerHTML = '';
                for(let i=0; i<WORKER_COUNT; i++) {
                    const w = new Worker(URL.createObjectURL(workerBlob));
                    const pip = document.createElement('div');
                    pip.className = "w-3 h-5 bg-zinc-900 rounded-sm";
                    grid.appendChild(pip);

                    w.onmessage = (msg) => {
                        if(msg.data.type === 'STATS') {
                            totalAttempts++;
                            if(totalAttempts % 100 === 0) {
                                document.getElementById('total-attempts').innerText = "Cycles: " + totalAttempts.toLocaleString();
                                pip.classList.add('active-pip');
                                setTimeout(() => pip.classList.remove('active-pip'), 100);
                            }
                        } else if(msg.data.type === 'MATCH') { processMatch(msg.data); }
                    };
                    w.postMessage({ prefix });
                    workers.push(w);
                }
            } else {
                btn.innerText = "Engage Turbines";
                btn.style.filter = "none";
                workers.forEach(w => w.terminate());
                workers = [];
            }
        }

        function processMatch(data) {
            harvestBin.push(data);
            document.getElementById('session-count').innerText = harvestBin.length;
            const res = document.getElementById('vanity-results');
            const div = document.createElement('div');
            div.className = "glass p-6 border-l-4 border-amber-400 flex justify-between items-center animate-pulse";
            div.innerHTML = `
                <div class="overflow-hidden">
                    <div class="text-[9px] text-amber-500 font-black">KERNEL HARVESTED</div>
                    <div class="text-xs font-bold text-white truncate w-48">${data.address}</div>
                </div>
                <button onclick="bank(${harvestBin.length - 1})" class="btn-glow px-4 py-2 rounded-xl text-[10px]">Bank</button>
            `;
            res.prepend(div);
        }

        function bank(idx) {
            const data = harvestBin[idx];
            const entropy = new Uint8Array(data.entropy);
            const wallet = xrpl.Wallet.fromEntropy(entropy.slice(0, 16));
            displayWallet(wallet, entropy);
            switchTab('vault');
        }
    </script>
</body>
</html>
